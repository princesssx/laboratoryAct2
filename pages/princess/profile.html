<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess | Profile</title>

<link rel="stylesheet" href="../../css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="sparkles"></div>

<nav class="navbar">
    <a href="portfolio.html">Journal</a>
    <a href="#" class="active">Profile</a>
</nav>

<!-- HEADER -->
<header class="profile-hero">
    <div class="overlay"></div>
    <div class="profile-hero-content">
        <h1>Princess</h1>
        <p>A quiet dreamer wrapped in blush light ✧</p>
    </div>
</header>

<div class="profile-container">

    <div class="profile-card" onclick="toggleProfile(this)">
        <div class="profile-top">
            <img src="../assets/princess.jpg" class="profile-img">
            <div>
                <div class="profile-name">Princess</div>
                <div class="profile-course">Bachelor of Science in Information Technology</div>
            </div>
        </div>

        <div class="profile-details">
            <div class="details-content">

                <div class="section-title"><i class="fa-solid fa-star"></i> Aspiring To Become</div>
                <div><i class="fa-solid fa-briefcase"></i> Creative Technologist & Designer</div>

                <div class="section-title"><i class="fa-solid fa-heart"></i> Interests</div>
                <div><i class="fa-solid fa-pen-nib"></i> Reading</div>
                <div><i class="fa-solid fa-palette"></i> Anime</div>
                <div><i class="fa-solid fa-music"></i> Soft Music & OPM</div>
                <div><i class="fa-solid fa-cloud"></i> Quiet Strolling</div>

            </div>
        </div>
    </div>

</div>

<script src="../../js/script.js"></script>
</body>
</html>
